# ==============================================================
# SPRING AI GEMINI CONFIGURATION
# ==============================================================
# Get your key at: https://aistudio.google.com/
spring.ai.google.genai.api-key=

# 1.5-flash is recommended for speed and low cost. 
# Use gemini-1.5-pro for higher accuracy but slower processing.
spring.ai.google.genai.chat.options.model=gemini-3.5-flash


# ==============================================================
# FILE UPLOAD SETTINGS (CRITICAL FOR VIDEO)
# ==============================================================
# Spring Boot default is 1MB. We need more for audio/video files.
# Increase these values if you plan to upload very large videos.
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB


# ==============================================================
# SERVER SETTINGS
# ==============================================================
server.port=8080


# ==============================================================
# LOGGING (Optional - helpful for debugging)
# ==============================================================
# Show more info about what Spring AI is doing in the console
logging.level.org.springframework.ai=INFO
# Show web request errors in detail
logging.level.org.springframework.web=INFO